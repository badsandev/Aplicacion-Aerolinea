<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold">✈ Airline System</h2>
      <p class="text-muted">Recupera tu contraseña</p>
    </div>

    <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form (ngSubmit)="recuperar()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control"
               [(ngModel)]="email" name="email"
               placeholder="Ingresa tu email" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="cargando">
        {{ cargando ? 'Enviando...' : 'Enviar email de recuperación' }}
      </button>
    </form>

    <hr/>
    <div class="text-center">
      <a routerLink="/login" class="small">Volver al login</a>
    </div>
  </div>
</div>
