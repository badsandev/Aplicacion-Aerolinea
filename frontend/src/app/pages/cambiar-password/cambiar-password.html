<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold">✈ Airline System</h2>
      <p class="text-muted">Cambia tu contraseña</p>
    </div>

    <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form (ngSubmit)="cambiar()">
      <div class="mb-3">
        <label class="form-label">Token</label>
        <input type="text" class="form-control"
               [(ngModel)]="token" name="token"
               placeholder="Token recibido en el email" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" class="form-control"
               [(ngModel)]="password" name="password"
               placeholder="Nueva contraseña" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-control"
               [(ngModel)]="confirmarPassword" name="confirmarPassword"
               placeholder="Confirma tu contraseña" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="cargando">
        {{ cargando ? 'Cambiando...' : 'Cambiar contraseña' }}
      </button>
    </form>

    <hr/>
    <div class="text-center">
      <a routerLink="/login" class="small">Volver al login</a>
    </div>
  </div>
</div>
